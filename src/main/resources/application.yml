spring:
  datasource:
    url: jdbc:h2:mem:bookstoredb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: ${JWT_SECRET:clave-secreta-super-larga-para-desarrollo-bookstore-api-2024}
    expiration: 86400000

server:
  servlet:
    context-path: /api/v1

logging:
  level:
    com.taller.bookstore: DEBUG
    org.springframework.security: INFO
